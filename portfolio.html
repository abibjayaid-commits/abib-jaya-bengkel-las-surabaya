<!DOCTYPE html>

<html lang="id" class="scroll-smooth">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Arsip Dokumentasi Proyek Abib Jaya. Bukti kerja keras dan presisi tim kami.">

    <link rel="icon" type="image/png" href="https://placehold.co/32x32/FF4500/001F3F?text=AJ">

    <title>Arsip Proyek | Abib Jaya Konstruksi</title>

    

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700;900&family=Open+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>

    

    <script>

        tailwind.config = {

            theme: {

                extend: {

                    colors: {

                        'navy-deep': '#001F3F',       

                        'navy-light': '#003366', 

                        'orange-safety': '#FF4500',   

                        'dark-bg': '#0f172a',         

                        'silver-metallic': '#D3D3D3',

                    },

                    fontFamily: {

                        mono: ['Oswald', 'sans-serif'], 

                        sans: ['Open Sans', 'sans-serif'],  

                    }

                }

            }

        }

    </script>

    

    <style>

        [x-cloak] { display: none !important; }

        .bg-grid-pattern {

            background-color: #0f172a;

            background-image: linear-gradient(rgba(255, 69, 0, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 69, 0, 0.05) 1px, transparent 1px);

            background-size: 30px 30px;

        }

        ::-webkit-scrollbar { width: 10px; }

        ::-webkit-scrollbar-track { background: #001F3F; }

        ::-webkit-scrollbar-thumb { background: #FF4500; }

        

        /* MASONRY LAYOUT LOGIC (CSS - ACERB) */

        .masonry-grid {

            column-count: 1;

            column-gap: 10px; /* Jarak antar kolom */

        }

        @media (min-width: 640px) { .masonry-grid { column-count: 2; } }

        @media (min-width: 768px) { .masonry-grid { column-count: 3; } }

        @media (min-width: 1024px) { .masonry-grid { column-count: 4; } }

        

        .masonry-item {

            break-inside: avoid;

            margin-bottom: 10px; /* Jarak bawah antar item */

            /* Menggunakan div luar untuk aspek rasio */

            background-color: #1f2937; 

            border-radius: 4px;

            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);

        }

        /* Perbaikan: Container untuk menampung aspek rasio 4:3 agar tidak ada CLS */

        .image-container {

            position: relative;

            padding-top: 75%; /* Rasio 4:3 (3/4 * 100%) */

            overflow: hidden;
        }

        .image-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Pastikan gambar menutupi area */
        }
        
        .item-card:hover img { transform: scale(1.05); }

    </style>

</head>

 

<body class="bg-dark-bg text-gray-300 font-sans antialiased" x-data="portfolioApp()">

    

    <!-- Header -->

    <header class="sticky top-0 z-50 bg-navy-deep border-b-4 border-orange-safety shadow-2xl">

        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

            <div class="flex justify-between items-center h-16">

                <a href="index.html" class="flex items-center space-x-2 group">

                    <i class="fas fa-arrow-left text-orange-safety group-hover:text-white transition"></i>

                    <span class="font-mono text-2xl font-black tracking-widest text-white">ABIB <span class="text-orange-safety">JAYA</span></span>

                </a>

                <!-- Navigasi Dihapus sesuai permintaan sebelumnya -->

                <div class="hidden md:block"></div> 

                <a href="https://wa.me/6281216359499?text=Halo%20Abib%20Jaya.%20Saya%20sudah%20melihat%20galeri%20proyek%20Anda%20dan%20tertarik%20untuk%20konsultasi%20serius%20terkait%20kebutuhan%20berikut%3A%0A%0A1.%20Jenis%20Proyek%3A%20...%0A2.%20Lokasi%3A%20...%0A3.%20Estimasi%20Ukuran%20(PxL)%3A%20..." class="bg-orange-safety text-navy-deep px-4 py-2 font-bold font-mono text-sm uppercase hover:bg-white transition rounded-md" target="_blank">

                    <i class="fab fa-whatsapp mr-1"></i> MINTA PENAWARAN

                </a>

            </div>

        </div>

    </header>

    

    <main class="bg-grid-pattern min-h-screen pb-20">

        

        <section class="pt-16 pb-8 text-center px-4">

            <h1 class="font-mono text-5xl md:text-6xl font-black text-white uppercase tracking-tighter mb-2">ARSIP PROYEK</h1>

            <p class="max-w-2xl mx-auto text-silver-metallic text-lg">

                Bukan janji di atas kertas. Ini adalah bukti kerja keras dan presisi tim kami, teruji di lapangan seluruh Nusantara.

            </p>

        </section>

        

        <section class="max-w-[1400px] mx-auto px-4">

            

            <!-- MASONRY GRID CONTAINER (CSS - ACERB) -->

            <div class="masonry-grid">

                <!-- Menggunakan visibleItems untuk memuat hanya yang perlu, mengurangi beban awal -->

                <template x-for="item in visibleItems" :key="item">

                    <div class="masonry-item item-card group relative overflow-hidden cursor-pointer border border-gray-700 rounded-lg shadow-xl"

                         @click="openModal(item)">

                        
                        <!-- Perbaikan CLS: Memastikan container memiliki padding-top untuk rasio 4:3 -->
                        <div class="image-container">
                            <img :src="item" 
                                 loading="lazy" 
                                 decoding="async"
                                 alt="Bukti Proyek Abib Jaya" 
                                 class="transition duration-700 ease-out block bg-gray-800 group-hover:opacity-80"
                                 onerror="this.onerror=null;this.src='https://placehold.co/400x300/333/FFF?text=Foto+Gagal+Muat';">
                        </div>
                        

                        <div class="absolute inset-0 bg-navy-deep/40 opacity-0 group-hover:opacity-100 transition duration-300 flex items-center justify-center">
                            <i class="fas fa-eye text-3xl text-orange-safety p-3 bg-black/70 rounded-full border border-orange-safety/50"></i>
                        </div>
                    </div>

                </template>

            </div>

            

            <!-- Tombol Load More -->

            <div class="mt-12 text-center pb-20">

                <button x-show="visibleCount < totalCount" 

                        @click="loadMore()"

                        class="inline-block px-12 py-4 bg-transparent border-2 border-orange-safety text-orange-safety font-mono text-xl font-bold uppercase hover:bg-orange-safety hover:text-navy-deep transition duration-300 tracking-widest rounded-lg shadow-lg">

                    <i class="fas fa-plus-circle mr-2"></i> MUAT ARSIP BERIKUTNYA (<span x-text="totalCount - visibleCount"></span> tersisa)

                </button>

                <p x-show="visibleCount >= totalCount" class="text-gray-500 font-mono text-sm uppercase tracking-widest mt-8">-- SELURUH DATA TERAMPILKAN --</p>

            </div>

        </section>

        

        <!-- Modal Gambar -->

        <div x-show="modalOpen" class="fixed inset-0 z-[100] flex items-center justify-center p-0 md:p-4 bg-navy-deep/95 backdrop-blur-md" 
             x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100" 
             x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
             x-cloak
             @keydown.escape.window="closeModal()">

            <div class="absolute inset-0 cursor-pointer" @click="closeModal()"></div>

            <div class="relative w-full max-w-6xl h-full md:h-auto md:max-h-[95vh] bg-black border-2 border-orange-safety/50 shadow-2xl flex flex-col overflow-hidden rounded-xl" @click.stop>

                <div class="w-full h-full bg-neutral-900 flex items-center justify-center relative p-2">

                     <button @click="closeModal()" 
                             class="absolute top-4 right-4 z-20 bg-black/50 text-white hover:text-orange-safety w-10 h-10 rounded-full flex items-center justify-center transition border border-gray-600 focus:outline-none focus:ring-2 ring-orange-safety/70">
                        <i class="fas fa-times text-xl"></i>
                    </button>

                     

                     <!-- Modal Image -->

                     <img :src="activeItem" class="max-w-full max-h-full object-contain rounded-lg">

                     

                     <div class="absolute bottom-4 left-4 bg-black/70 px-3 py-1 text-white text-xs font-mono border-l-4 border-orange-safety rounded-r-md">

                         <span x-text="activeItem.substring(activeItem.lastIndexOf('/') + 1)"></span> <!-- Menampilkan nama file -->

                     </div>
                </div>

            </div>

        </div>

    </main>

    

    <footer class="bg-black text-center py-6 border-t border-gray-800 text-gray-600 text-xs font-mono">

        <p>&copy; 2024 ABIB JAYA KONSTRUKSI. DATA DILINDUNGI. DIBUAT DENGAN PRESISI (KECUALI FOTO). </p>

        <a href="index.html" class="text-orange-safety hover:underline mt-2 inline-block">KEMBALI KE BERANDA</a>

    </footer>

    

    <script>

        function portfolioApp() {

            // DATABASE 157 FOTO (URL DARI GITHUB PAGES)
            // PERINGATAN KERAS: Penggunaan GitHub Pages untuk aset skala besar akan berdampak negatif pada kinerja dan latensi.

            const projectImages = [];
            for (let i = 1; i <= 157; i++) {
                // Menggunakan skema URL baru sesuai permintaan
                projectImages.push(`https://abibjayaid-commits.github.io/abib-jaya-assets/project-2-${i}.webp`);
            }
            
            return {

                items: projectImages, // Menggunakan array yang dibuat

                visibleCount: 20, // Jumlah awal yang ditampilkan

                increment: 20, // Jumlah penambahan saat "Load More"

                modalOpen: false,

                activeItem: '',

                

                get visibleItems() { 

                    return this.items.slice(0, this.visibleCount); 

                },

                get totalCount() { 

                    return this.items.length; 

                }, 

                

                loadMore() { 

                    this.visibleCount = Math.min(this.totalCount, this.visibleCount + this.increment); 

                },

                

                openModal(item) {

                    this.activeItem = item;

                    this.modalOpen = true;

                    // Mengunci scroll saat modal terbuka

                    document.body.style.overflow = 'hidden';

                },

                closeModal() {

                    this.modalOpen = false;

                    // Mengembalikan scroll 

                    document.body.style.overflow = 'auto';

                }

            }

        }

        // Menambahkan event listener untuk menutup modal dengan tombol Escape

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && document.body.style.overflow === 'hidden') {
                // Memanggil fungsi closeModal dari komponen Alpine.js jika tersedia
                if (typeof window.portfolioApp().closeModal === 'function') {
                    window.portfolioApp().closeModal();
                }
            }
        });
    </script>

</body>

</html>
