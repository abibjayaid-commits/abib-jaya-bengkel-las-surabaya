                "https://i.ibb.co.com/93N0YYNn/IMG-20220612-154131.jpg",

                "https://i.ibb.co.com/vxMRnyTk/IMG-20250527-174553.jpg",

                "https://i.ibb.co.com/M5tMRQgJ/IMG-20251202-WA0041.jpg"

            ];

            

            return {

                items: projectImages, // Menggunakan array langsung

                visibleCount: 20,

                increment: 20,

                modalOpen: false,

                activeItem: '',

                

                get visibleItems() { 

                    return this.items.slice(0, this.visibleCount); 

                },

                get totalCount() { 

                    return this.items.length; 

                }, 

                

                loadMore() { 

                    this.visibleCount += this.increment; 

                },

                

                openModal(item) {

                    this.activeItem = item;

                    this.modalOpen = true;

                    document.body.style.overflow = 'hidden';

                },

                closeModal() {

                    this.modalOpen = false;

                    document.body.style.overflow = 'auto';

                }

            }

        }

    </script>
